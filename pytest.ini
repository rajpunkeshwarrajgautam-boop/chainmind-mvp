[pytest]
# Backup only: tests/conftest.py patches away Authlib's simplefilter("always", AuthlibDeprecationWarning),
# which otherwise prepends inside pytest's catch_warnings and beats any ini filter.
filterwarnings = ignore:authlib\.jose module is deprecated:DeprecationWarning::
markers =
    mvp_vertical_slice: Routes and flows promised for pilot demos (auth + forecast + uploads per README).
    extended_stub: Beyond MVP — must remain explicitly stubbed (501 or template_only) until wired.
    offline_helper: Pure functions / ML helpers; not HTTP pilot contracts.
