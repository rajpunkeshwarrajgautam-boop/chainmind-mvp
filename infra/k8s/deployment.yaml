apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainmind-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: chainmind-api
  template:
    metadata:
      labels:
        app: chainmind-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/chainmind:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: chainmind-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainmind-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chainmind-worker
  template:
    metadata:
      labels:
        app: chainmind-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/chainmind:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO"]
          envFrom:
            - secretRef:
                name: chainmind-secrets
