# Full stack for the vertical slice: Postgres + Redis + API + Celery worker.
# See README.md for curl and Next.js smoke UI.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chainmind
      POSTGRES_PASSWORD: chainmind
      POSTGRES_DB: chainmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainmind -d chainmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://chainmind:chainmind@postgres:5432/chainmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
      ENVIRONMENT: production
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://chainmind:chainmind@postgres:5432/chainmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: {}
